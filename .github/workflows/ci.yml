name: CI + AI Agent

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "hotfix/**"
    # ai-fix/* branches are NOT listed — CI won't run on them
    # This prevents the agent from triggering itself in a loop

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        id: install
        run: pip install -r requirements.txt
        continue-on-error: true

      - name: Run tests
        id: run_tests
        run: |
          pytest tests/ -v --tb=long 2>&1 | tee test_output.log
        continue-on-error: true

      - name: Check for failures
        id: check
        run: |
          if grep -qE "FAILED|ERROR" test_output.log; then
            echo "TESTS_FAILED=true" >> $GITHUB_ENV
          else
            echo "TESTS_FAILED=false" >> $GITHUB_ENV
          fi

      - name: Notify AI Agent on failure
        # Extra safety: never notify from ai-fix branches
        if: |
          (steps.install.outcome == 'failure' || env.TESTS_FAILED == 'true') &&
          !startsWith(github.ref_name, 'ai-fix/')
        run: |
          if [ "${{ steps.install.outcome }}" == "failure" ]; then
            FAILED_STEP="Install dependencies"
          else
            FAILED_STEP="Run tests"
          fi

          PAYLOAD=$(python3 -c "
          import json, os
          log = open('test_output.log').read() if os.path.exists('test_output.log') else 'Install failed'
          print(json.dumps({
            'source': 'github_actions',
            'repo': '${{ github.repository }}',
            'run_id': '${{ github.run_id }}',
            'branch': '${{ github.ref_name }}',
            'commit_sha': '${{ github.sha }}',
            'actor': '${{ github.actor }}',
            'failed_step': '${FAILED_STEP}',
            'raw_log': log,
            'dry_run': False
          }))
          ")

          curl -X POST "${{ secrets.AI_AGENT_URL }}/webhook/pipeline-failure" \
            -H "Content-Type: application/json" \
            -H "ngrok-skip-browser-warning: true" \
            -d "$PAYLOAD" \
            --max-time 30 \
            --silent --show-error \
            || echo "AI Agent notification failed"

      - name: Fail job if tests failed
        if: steps.install.outcome == 'failure' || env.TESTS_FAILED == 'true'
        run: exit 1